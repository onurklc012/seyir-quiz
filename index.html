<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e27;--card:#131842;--card2:#1a2050;--accent:#4f6efb;
  --accent2:#7b5cfa;--green:#22c55e;--green-bg:rgba(34,197,94,.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);--text:#e8eaf6;
  --text2:#9ca3c4;--border:rgba(79,110,251,.15);
  --shadow:0 8px 32px rgba(0,0,0,.35);--radius:16px
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}

/* ─── HEADER ─── */
.header{background:linear-gradient(135deg,#131842,#1e2760);border-bottom:1px solid var(--border);
  padding:16px 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#7b9cff,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.header .sub{text-align:center;font-size:12px;color:var(--text2);margin-top:2px}
.back-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;
  border:none;color:var(--accent);font-size:24px;cursor:pointer;padding:8px;display:none}

/* ─── TOPIC GRID ─── */
.topics{padding:20px;max-width:700px;margin:0 auto}
.topics h2{font-size:22px;font-weight:800;margin-bottom:4px;text-align:center;
  background:linear-gradient(135deg,#7b9cff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topics .info{text-align:center;color:var(--text2);font-size:13px;margin-bottom:20px}
.topic-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;margin-bottom:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.topic-card:hover,.topic-card:active{background:var(--card2);border-color:var(--accent);
  transform:translateY(-2px);box-shadow:var(--shadow)}
.topic-card .num{position:absolute;top:12px;right:16px;font-size:32px;font-weight:800;
  color:rgba(79,110,251,.1)}
.topic-card .name{font-size:16px;font-weight:600;margin-bottom:4px}
.topic-card .count{font-size:13px;color:var(--text2)}
.topic-card .prog-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:10px;overflow:hidden}
.topic-card .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;transition:width .3s}

/* ─── QUIZ VIEW ─── */
.quiz{display:none;padding:16px;max-width:700px;margin:0 auto}
.progress-wrap{margin-bottom:16px}
.progress-info{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:6px}
.progress-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:3px;transition:width .4s ease}

.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;box-shadow:var(--shadow);animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.q-num{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:8px}
.q-text{font-size:16px;font-weight:500;line-height:1.5;margin-bottom:20px;min-height:40px}

.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{background:var(--card2);border:2px solid var(--border);border-radius:12px;
  padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;
  text-align:left;font-size:15px;color:var(--text);font-family:'Inter',sans-serif;width:100%}
.choice-btn:hover:not(.disabled){border-color:var(--accent);background:rgba(79,110,251,.08)}
.choice-btn:active:not(.disabled){transform:scale(.98)}
.choice-letter{width:36px;height:36px;border-radius:10px;background:rgba(79,110,251,.1);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;
  color:var(--accent);flex-shrink:0;transition:all .3s}
.choice-text{flex:1;line-height:1.4}

.choice-btn.correct{border-color:var(--green);background:var(--green-bg);animation:pulse-green .5s}
.choice-btn.correct .choice-letter{background:var(--green);color:#fff}
@keyframes pulse-green{0%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}100%{box-shadow:0 0 0 12px rgba(34,197,94,0)}}

.choice-btn.wrong{border-color:var(--red);background:var(--red-bg);animation:shake .4s}
.choice-btn.wrong .choice-letter{background:var(--red);color:#fff}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.choice-btn.disabled{cursor:default;opacity:.6}
.choice-btn.correct.disabled{opacity:1}

.next-wrap{margin-top:20px;text-align:center}
.next-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  border:none;border-radius:12px;padding:14px 40px;font-size:16px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,110,251,.3)}

/* ─── RESULT VIEW ─── */
.result{display:none;padding:20px;max-width:700px;margin:0 auto;text-align:center}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:40px 24px;box-shadow:var(--shadow)}
.result-emoji{font-size:64px;margin-bottom:16px}
.result-title{font-size:24px;font-weight:800;margin-bottom:8px}
.result-score{font-size:48px;font-weight:800;margin:16px 0;
  background:linear-gradient(135deg,var(--green),#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-detail{color:var(--text2);font-size:15px;margin-bottom:24px}
.result-bar{width:80%;height:12px;background:rgba(255,255,255,.06);border-radius:6px;
  margin:0 auto 24px;overflow:hidden}
.result-bar-fill{height:100%;border-radius:6px;transition:width 1s ease}
.result-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.result-btns button{padding:12px 28px;border-radius:12px;font-size:15px;font-weight:600;
  cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .2s}
.btn-retry{background:var(--accent);color:#fff}
.btn-topics{background:var(--card2);color:var(--text);border:1px solid var(--border)!important}

/* ─── SCORE BADGE ─── */
.score-badge{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:10px 16px;font-size:13px;font-weight:600;box-shadow:var(--shadow);z-index:50;
  display:none}
.score-badge .s-correct{color:var(--green)}
.score-badge .s-wrong{color:var(--red)}

/* ─── RESPONSIVE ─── */
@media(max-width:480px){
  .header h1{font-size:15px}
  .q-text{font-size:14px}
  .choice-btn{padding:12px;font-size:14px}
  .choice-letter{width:32px;height:32px;font-size:13px}
  .topic-card .name{font-size:14px}
}
</style>
</head>

":{"a":"prt","d":"frekansı","b":"prf","e":"ebl","c":"peak power"},"answer":"E"},{"qn":255,"text":"Aynı mesafede bulunan fakat birbirine yakın yanyana olan hedeflerin ayırt edilmesi radarın hangi özelliği ile ilgilidir?","choices":{"a":"Kerteriz ayrımı -Bearing resolution","d":"Radar hassasiyeti-Radar accuracy","b":"Radar PRF değeri","e":"Radar kazancı -Radar gain","c":"Mesafe ayrımı -Range resolution"},"answer":"C"},{"qn":256,"text":"Seyir RADAR’larının IMO standartlarına göre Yatay Hüzme (Beam) genişliği aşağıdakilerden hangisidir?","choices":{"a":"2-4°","d":"0.6-2°","b":"0-0.5°","e":"20-30°","c":"5-10°"},"answer":"D"},{"qn":257,"text":"Pals genişliği 1 mikro saniye olan bir radarın ölçebileceği asgari mesafe ne kadardır?","choices":{"a":"75 metre","d":"15 metre","b":"300 metre","e":"150 metre","c":"340 metre"},"answer":"E"},{"qn":258,"text":"Bir geminin radarı ile 300 metre mesafedeki bir gemi temasını tespit edebilmek için radar palsının gönderilmesinden sonra ne kadar süre geçmesi gerekir?","choices":{"a":"2 saniye","d":"1 saniye","b":"2 mikro saniye","e":"1 mikro saniye","c":"20 mikro saniye"},"answer":"B"},{"qn":259,"text":"RADAR’a cayro pusula değeri girilmediği takdirde resim seçimi aşağıdakilerden hangisi olmalıdır?","choices":{"a":"North-up","d":"Course-up","b":"Pick-up","e":"Head-up","c":"TM"},"answer":"E"},{"qn":262,"text":"“Course mode” un seyirdeki etkisi nedir?","choices":{"a":"Planlanan ve gidilen rota arasındaki fark gösterilir","d":"Rota otomatik olarak merkez dışı (off -set)","b":"Gemi rotası büyük daire seyri şeklinde gösterilir","e":"Rota merkez dışında (off -set) düzeltilemez","c":"Gemi rotası kerte hattı şeklinde gösterilir"},"answer":"C"},{"qn":263,"text":"Bir radar Kuzey Yukarı (North Up) oryantasyonu durumunda kullanılıyor ise;","choices":{"a":"Gemi dönerken gemi ve kara ekoları geminin döndüğü","d":"Pruvada bulunan ve gözle görülen gemi ve","b":"Gemi dönerken pruva çakarı cayro ile uyumlu şekilde","e":"Gemi dönerken pruva çakarı ekranda üst","c":"Gemi dönerken gemi ve kara ekoları geminin döndüğü"},"answer":"B"},{"qn":264,"text":"Eğer Radarınızı N - UP ve TM çalıştırıyorsanız, aşağıdaki durumların hangisinde Radar ekranında hareketsiz bir eko oluşur?","choices":{"a":"Şamandıra ekosu","d":"Gemimiz ile aynı hızda ilerleyen bir gemi","b":"Radar ekranında görülen herşey hareketlidir","e":"Gemimiz ile aynı rotada ilerleyen bir gemi","c":"Gemimizin pruva hattı"},"answer":"A"},{"qn":266,"text":"Geminiz ile RACON taşıyan bir şamandıraya yaklaşırken bu şamandıranın Radar ekranınızdaki görüntüsü ne şekilde belirlenir?","choices":{"a":"Radar taraması sırasında ekonun şamandıra üzerine","d":"Şamandıra ile aynı mesafede ve içe doğru","b":"Şamandıranın bulunduğu kerteriz yönünde dışa doğru","e":"Şamandıra ekosunun çevresinde","c":"Radarın merkezinden şamandıra yönüne uzanan kesikli"},"answer":"B"},{"qn":267,"text":"Resimde görülen iki radar ekranlarından A ile B arasındaki fark nedir?","choices":{"a":"B ekranında ikincil kerteriz ekosu oluşmuştur","d":"A ekranının Sea clutter ayarı bozuktur","b":"B ekranında radar yansıtıcılı bir tekne vardır","e":"A ekranında Racon çalışmamaktadır","c":"Fark yoktur"},"answer":"E"},{"qn":268,"text":"Yukarıdaki ARPA görüntüsü için aşağıdakilerden hangisi doğrudur?","choices":{"a":"ARPA Manuel izlemede olup, vardiya zabiti hedefi","d":"Koruma çemberine giren hedef için Olası","b":"ARPA’nın alan araması (Search Area) fonksiyonu saha","e":"Hedef koruma kalkanının etki sahasının dışına","c":"Koruma çemberine bir hedef girmiştir ancak vektörel"},"answer":"A"},{"qn":269,"text":"Yukarıdaki ARPA sembolü için aşağıdakilerden hangisi doğrudur?","choices":{"a":"En Muhtemel Çatışma Noktası","d":"PPC-","b":"Saha arama elipsi","e":"CPA’ye bağlı olarak oluşan Tahmini Tehlike","c":"Girilen TCPA’ye duyarlı olarak oluşan emniyetli alan"},"answer":"A"},{"qn":270,"text":"Yukarıdaki coğrafi şekil ile radar görüntüsü karşılaştırıldığında aşağıdakilerden hangisi doğrudur?","choices":{"a":"Akıntı önleme rotası uygulanmamaktadır","d":"Düşme açısı kullanılarak radarda plotlama","b":"Fiks ve EP belirleyerek kıyı seyri yapılmaktadır","e":"Borda istikametinde yetişip geçmekte olan","c":"Paralel Indeks kullanılarak akıntı önleme rotasında seyir"},"answer":"D"},{"qn":272,"text":"Yukarıdaki gerçek coğrafi alan ile radar görüntüsü arasındaki fark neden kaynaklanmaktadır?","choices":{"a":"Radarın yatay huzme açısından","d":"Radarın yatay huzme açısının genişliğinden","b":"Radarın mesafe ayrım duyarsızlığından","e":"Radarın anten yüksekliğinden","c":"Radarın pulse süresinden"},"answer":"D"},{"qn":273,"text":"Elektrik alanının yönü ile elektromanyetik dalganın hareket yönünü gösteren vektörleri içinde bulunduran düzlem ____________ olarak adlandırılır.","choices":{"a":"Elektrik Alan","d":"Dalga Yönü","b":"Polarizasyon","e":"Akım Yönü","c":"Manyetik Alan"},"answer":"B"},{"qn":277,"text":"Ses farklı ortamlarda değişik hızlara sahiptir. Bu bilgiye göre; sesin hızı ile ilgili yüksekten düşüğe doğru hangi şıkta doğru verilmiştir?","choices":{"a":"Hava > Katı > Sıvı","d":"Su > Hava > Katı","b":"Katı > Hava > Sıvı","e":"Katı > Sıvı > Hava","c":"Sıvı > Katı > Hava"},"answer":"E"},{"qn":278,"text":"Transducer nedir?","choices":{"a":"Elektrik enerjisini sese, ses enerjisini elektrik enerjisine","d":"Ses enerjisini yükselten bir aygıttır","b":"Manyetik enerjiyi elektrik, elektrik enerjisini manyetik","e":"Bir vericidir","c":"Bir amplifayerdir"},"answer":"A"},{"qn":279,"text":"Elektromanyetik transmisyon, dalganın sahip olduğu frekansa göre sınıflandırılır. Bu sınıflandırmada aşağıdaki tanımlamalar yapılmıştır;","choices":{"a":"En kısa dalga boyuna sahip dalga ultraviyole radyasyon,","d":"En uzun dalga boyuna sahip dalga radyo","b":"En uzun dalga boyuna sahip dalga ultraviyole","e":"En uzun dalga boyuna sahip dalga x ışınları, en","c":"En kısa dalga boyuna sahip dalga x ışınları, en uzun"},"answer":"D"}]},{"id":18,"name":"Radar ve Plotlama","questions":[{"qn":1,"text":"AIS donanımlı bir ARPA Radar ile pilotlanan hedefin hangi bilgisine ulaşılamaz?","choices":{"a":"EYN bilgileri","d":"Personel sayısı","b":"Geminin çağrı işareti","e":"Şirket bilgileri","c":"Kalkış - varış limanı"},"answer":"E"},{"qn":2,"text":"ARPA RADAR’da pilotlanan gemiye ait gösterilen bilgilerden hangisi yer almaz?","choices":{"a":"Geminin bağlama limanı","d":"Geminin rotası","b":"Geminin hızı","e":"Yaklaşma mesafesi","c":"Çatışma anı"},"answer":"A"},{"qn":3,"text":"ARPA radarın hangi fonksiyonu ile hedefler plotlanmaktadır?","choices":{"a":"ACQ TGT","d":"DEL ALL","b":"ZONE SET","e":"DIST TGT","c":"DEL TGT"},"answer":"A"},{"qn":4,"text":"Gemimizin diğer gemiler ile arasındaki mesafenin en az olduğu yere","choices":{"a":"Temasın uzaklaşma noktası","d":"Nispi hareket hattı yönü","b":"Temasın yaklaşma noktası","e":"Nispi yaklaşma noktası","c":"Azami yaklaşma noktası"},"answer":"C"},{"qn":6,"text":"Predicted Area of Danger (PAD) alanının şekli aşağıdakilerden hangisiyle değişir?","choices":{"a":"CPA","d":"Kendi gemimizin rotası","b":"Karşı hedefin devir dairesi yarı çapı","e":"TCPA","c":"ARPA'nın gerçek veya göreli harekette çalışması"},"answer":"A"},{"qn":7,"text":"Göreli hareket modunda çalışan bir ARPA Radarda CPA değeri nasıl saptanır?","choices":{"a":"Devamlı kerteriz alındığında","d":"CPA’nın sayısal değeri sadece gerçek hareket","b":"Sadece Radar görüntüsünün sürekli izlendiği hallerde","e":"Görüntü N-","c":"Hedef en az iki kez plotlandıktan sonra"},"answer":"C"},{"qn":8,"text":"Aşağıdaki ifadelerden hangisi doğrudur?","choices":{"a":"CPA ile hedeflerin gemimizden en yakın pruva geçiş","d":"Hedeflerin CPA değeri azaldıkça TCPA değeri","b":"CPA değeri daima pruva geçiş mesafesinden küçüktür","e":"Eğer hedefin mesafesi azalmakta ve kerterizi","c":"Hedeflerin CPA değeri arttıkça TCPA değeri büyür"},"answer":"E"},{"qn":9,"text":"ARPA hedef tehdidi alarmını ne zaman verir?","choices":{"a":"İzlenmekte olan bir hedef CPA içine girdiği zaman","d":"İzlenmekte olan bir hedef için CPA ve TCPA","b":"İzlenmekte olan bir hedef koruma çemberi içine girdiği","e":"İzlenmeyen bir hedef","c":"İzlenmeyen bir hedef koruma çemberi içine girdiği"},"answer":"D"},{"qn":11,"text":"ARPA- Radar cihazında 3,5 mile kurulmuş olan koruma çemberinin içine bir hedef girdiğinde;","choices":{"a":"Eğer otomatik izlemeye alma fonksiyonu devrede ise","d":"ARPA hedef tehdidi alarmı verir","b":"Cihaz sesli olarak hiçbir alarm vermez","e":"Eğer otomatik izlemeye alma fonksiyonu devre","c":"Hiçbiri"},"answer":"E"},{"qn":12,"text":"ARPA’da izlenen iki hedefin tokuşması (swop) hedeflerin birbirine göre durumu ile ilişkilidir. Buna göre aşağıdaki durumların hangisinde tokuş olayı meydana gelir?","choices":{"a":"Birbirine yakın geçen hedefler arasında","d":"Aynı kerterizdeki iki hedef arasında","b":"Arama alanı (search area) içinde otomatik izlenen","e":"Aynı mesafedeki hedefler arasında","c":"Aynı hızda ve paralel seyreden hedefler arasında"},"answer":"A"},{"qn":13,"text":"Radar plotlaması ile ilgili olarak aşağıdaki ifadelerden hangisi doğrudur?","choices":{"a":"Temasların tespit edilme zamanları önemli değildir","d":"Sahile yakın seyirlerde, kazanç (Gain) süvici","b":"Özellikle sahile yakın bölgelerde seyir yapılırken,","e":"Radar","c":"Sahile yakın seyrederken, mesafe skalası; mümkün"},"answer":"C"},{"qn":15,"text":"Geminiz 10 knots ile seyrederken saat 1800’da tam pruvada 10 milde bir cisim tespit ettiniz. Saat 1812’de aynı cisim kerterizi değişmeden 8 mile yaklaşmıştır. Cismin hesaplanan rota ve sürati ne kadardır?","choices":{"a":"Cisim sürat göstermemektedir","d":"Verilenler ile değerlendirme yapılamaz","b":"Cisim 2 kts sürat ile aksi rotada yaklaşmaktadır","e":"Cisim 1 kts sürat ile aynı rotada","c":"Cisim 1 kts sürat ile aksi rotada yaklaşmaktadır"},"answer":"A"},{"qn":16,"text":"Seyir halindeki bir gemide radar ile izlediğiniz bir temasın hem kerterizi hem de mesafesi son 12 dakikadır sabit ise;","choices":{"a":"Temasın sürati sizden farklı, rotası aynıdır","d":"Çatışma olacaktır","b":"Temasın rotası sizden farklı, sürati aynıdır","e":"Temas sizinle aynı rota ve süratte seyir","c":"Temas demirlidir"},"answer":"E"},{"qn":17,"text":"Sizi sancak bordanızdan yakın bir mesafeden yetişip geçmekte olan bir geminin Radar ekranından elde etmiş olduğunuz hedef görüntülerinde 090° kerterizinde 0,5 mil, 1 ve 1,5 mil de 3 farklı eko teması tespit edildiğine göre aşağıdakilerden hangisi doğrudur?","choices":{"a":"İkincide gelen ekolardır","d":"Kazanç ayarının yüksek","b":"Gemi üstü engellerden kaynaklanan yanlış kerteriz","e":"Denizlerden kaynaklanan yanlış","c":"Radar slot anteninden kaynaklanan hüzmelerin sebep"},"answer":"A"},{"qn":18,"text":"Geminizin sürat vektörü aynı zamanda dakika cinsinden seçilen vektör boyuna göre geminin yaptığı sürate göre kat edilecek mesafeyi de göstereceğinden 15 kts sürat yapan bir geminin 3000 Yd. sonra bulunacağı mevkiyi (vektörün ucu) gösterecek olan vektör boyu kaç dakika olarak seçilmelidir?","choices":{"a":"3","d":"12","b":"6","e":"15","c":"9"},"answer":"B"}]}]};

let state = {
  topicIdx: -1,
  qIdx: 0,
  correct: 0,
  wrong: 0,
  answered: false,
  progress: {} // topicId -> {correct, total, done}
};

// Load progress from localStorage
try {
  const saved = localStorage.getItem('seyir_quiz_progress');
  if(saved) state.progress = JSON.parse(saved);
} catch(e) {}

function saveProgress() {
  try { localStorage.setItem('seyir_quiz_progress', JSON.stringify(state.progress)); } catch(e) {}
}

function showTopics() {
  document.getElementById('topicsView').style.display = 'block';
  document.getElementById('quizView').style.display = 'none';
  document.getElementById('resultView').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('scoreBadge').style.display = 'none';
  renderTopics();
}

function renderTopics() {
  const el = document.getElementById('topicsView');
  let totalQ = 0;
  DATA.topics.forEach(t => totalQ += t.questions.length);

  let html = `<h2>📚 Konu Seçin</h2><div class="info">${totalQ} soru · 18 konu</div>`;
  DATA.topics.forEach((t, i) => {
    const p = state.progress[t.id] || {correct:0, total:t.questions.length, done:false};
    const pct = p.done ? Math.round(p.correct / p.total * 100) : 0;
    const prog = p.done ? pct : 0;
    html += `<div class="topic-card" onclick="startTopic(${i})">
      <div class="num">${t.id}</div>
      <div class="name">${t.name}</div>
      <div class="count">${t.questions.length} soru${p.done ? ' · %'+pct+' başarı' : ''}</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
    </div>`;
  });
  el.innerHTML = html;
}

function startTopic(idx) {
  state.topicIdx = idx;
  state.qIdx = 0;
  state.correct = 0;
  state.wrong = 0;
  state.answered = false;

  document.getElementById('topicsView').style.display = 'none';
  document.getElementById('quizView').style.display = 'block';
  document.getElementById('resultView').style.display = 'none';
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('scoreBadge').style.display = 'block';

  renderQuestion();
}

function retryTopic() {
  startTopic(state.topicIdx);
}

function renderQuestion() {
  const topic = DATA.topics[state.topicIdx];
  const q = topic.questions[state.qIdx];
  const total = topic.questions.length;

  document.getElementById('topicName').textContent = topic.name;
  document.getElementById('qCounter').textContent = `Soru ${state.qIdx+1}/${total}`;
  document.getElementById('progressFill').style.width = (((state.qIdx) / total) * 100) + '%';
  document.getElementById('qNum').textContent = `Soru ${q.qn}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('liveCorrect').textContent = state.correct;
  document.getElementById('liveWrong').textContent = state.wrong;

  state.answered = false;

  // Render choices in order
  const letters = ['a','b','c','d','e'];
  const el = document.getElementById('choices');
  el.innerHTML = '';

  letters.forEach(letter => {
    if(!(letter in q.choices)) return;
    const choiceText = q.choices[letter] || '—';
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letter.toUpperCase()}</span><span class="choice-text">${escHtml(choiceText)}</span>`;
    btn.onclick = () => selectAnswer(letter.toUpperCase(), q.answer, btn);
    el.appendChild(btn);
  });
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function selectAnswer(selected, correct, btn) {
  if(state.answered) return;
  state.answered = true;

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.classList.add('disabled'));

  if(selected === correct) {
    btn.classList.add('correct');
    state.correct++;
  } else {
    btn.classList.add('wrong');
    state.wrong++;
    // Highlight correct
    allBtns.forEach(b => {
      const letter = b.querySelector('.choice-letter').textContent;
      if(letter === correct) b.classList.add('correct');
    });
  }

  document.getElementById('liveCorrect').textContent = state.correct;
  document.getElementById('liveWrong').textContent = state.wrong;

  const topic = DATA.topics[state.topicIdx];
  if(state.qIdx + 1 < topic.questions.length) {
    document.getElementById('nextBtn').style.display = 'inline-block';
    document.getElementById('nextBtn').textContent = 'Sonraki →';
  } else {
    document.getElementById('nextBtn').style.display = 'inline-block';
    document.getElementById('nextBtn').textContent = 'Sonuçları Gör';
  }
}

function nextQuestion() {
  const topic = DATA.topics[state.topicIdx];
  state.qIdx++;
  if(state.qIdx >= topic.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  const topic = DATA.topics[state.topicIdx];
  const total = topic.questions.length;
  const pct = Math.round(state.correct / total * 100);

  state.progress[topic.id] = {correct: state.correct, total: total, done: true};
  saveProgress();

  document.getElementById('quizView').style.display = 'none';
  document.getElementById('resultView').style.display = 'block';
  document.getElementById('scoreBadge').style.display = 'none';

  let emoji, title, barColor;
  if(pct >= 90) { emoji = '🏆'; title = 'Mükemmel!'; barColor = 'var(--green)'; }
  else if(pct >= 70) { emoji = '👏'; title = 'Harika!'; barColor = '#4ade80'; }
  else if(pct >= 50) { emoji = '💪'; title = 'İyi Çalışma!'; barColor = '#facc15'; }
  else { emoji = '📖'; title = 'Biraz Daha Çalış'; barColor = 'var(--red)'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = `%${pct}`;
  document.getElementById('resultDetail').textContent =
    `${state.correct} doğru · ${state.wrong} yanlış · ${total} soru · ${topic.name}`;

  const barFill = document.getElementById('resultBarFill');
  barFill.style.background = barColor;
  setTimeout(() => barFill.style.width = pct + '%', 100);
}

// Init
showTopics();
</script>
</body>
</html>
